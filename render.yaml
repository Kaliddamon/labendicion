services:
  - type: web
    name: labendicion-backend
    env: docker
    rootDir: backend
    dockerfile: Dockerfile
    dockerContext: .
    region: oregon
    plan: free
    healthCheckPath: /actuator/health
    healthCheckTimeout: 300
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: supabase
      - key: PORT
        value: 8080
      - key: CORS_ALLOWED_ORIGINS
        value: 'https://labendicion.vercel.app'
      - key: SWAGGER_ENABLED
        value: 'true'
      # IMPORTANTE: Agrega estas variables en Render Dashboard
      # DATABASE_URL: postgresql://postgres:PASSWORD@db.ujsioelnrctyalqezyay.supabase.co:5432/postgres
      # PGUSER: postgres
      # PGPASSWORD: tu_contraseña_supabase





