# Supabase PostgreSQL Connection
# Convierte URL de Supabase (postgresql://) a formato JDBC (jdbc:postgresql://)
spring.datasource.url=jdbc:${DATABASE_URL:postgresql://localhost:5432/postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:password}

# Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-lifetime=600000
spring.datasource.hikari.auto-commit=true

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Swagger
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/api-docs

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://labendicion.vercel.app}




